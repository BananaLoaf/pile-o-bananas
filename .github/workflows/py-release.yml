name: Python Release

on:
  push:
    tags:
      - v*

permissions:
  id-token: write

jobs:
  python-build:
    uses: BananaLoaf/ci-cd/.github/workflows/py-build.yml@master

  python-release:
    name: python-release
    needs: python-build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - uses: actions/download-artifact@v4
        with:
          name: dist-files
          path: dist/

      - name: Publish
        run: uv publish

