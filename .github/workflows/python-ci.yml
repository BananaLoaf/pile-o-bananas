name: Python CI

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  python-ci:
    uses: BananaLoaf/ci-cd/.github/workflows/python-ci.yml@master
    with:
      skip-typecheck: true
      mypy-path: pile_o_bananas/
      mypy-options: --ignore-missing-imports

  python-build:
    needs: python-ci
    if: startsWith(github.ref, 'refs/tags/v')
    uses: BananaLoaf/ci-cd/.github/workflows/python-build.yml@master

  python-release:
    if: startsWith(github.ref, 'refs/tags/v')
    name: python-release
    needs: python-build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          ignore-empty-workdir: true

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        run: uv publish
